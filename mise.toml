## lake dev toolchain + tasks — managed by mise (https://mise.jdx.dev)
##
## `mise install` is the whole environment setup; `mise run doctor` is the
## session-start health check. mise is the ONLY tool a user must install
## themselves — it takes over everything else.
##
## Rust is intentionally NOT here: `rust-toolchain.toml` pins stable, and
## nightly (for fmt + doc warnings) comes from rustup. mise's rust backend
## would fight rustup.
##
## No inline scripts in this file: anything beyond a one-liner lives in
## scripts/*.ts (TypeScript, run with bun).

[tools]
jj   = "0.43.0"        # VCS — jj with colocated git backend (GitHub interop)
gh   = "2.92.0"        # PR + issue workflow
bun  = "1.3.14"        # runs scripts/*.ts
uv   = "0.11.26"       # uvx runs the code-review-graph MCP server (.mcp.json)
"ubi:j178/prek" = "0.4.8"     # quality gate runner (.pre-commit-config.yaml)
"cargo:agent-spec" = "0.3.0"  # lane-1 BDD gate (spec-lint / spec-lifecycle)
"cargo:cargo-deny" = "0.19.0" # dependency advisories, bans, licenses, and sources
"cargo:cargo-shear" = "1.13.1" # unused Cargo dependency detection
# Prebuilt LocalStack integration test runner.
"github:nextest-rs/nextest" = "cargo-nextest-0.9.140"
# Protocol Buffer compiler required by Lance build scripts.
"aqua:protocolbuffers/protobuf/protoc" = "35.1"
"aqua:yannh/kubeconform" = "0.7.0" # strict Kubernetes OpenAPI validation
"cargo:bacon" = "3"   # local watch loop: `mise run watch` (clippy on save)

[env]
# CARGO_INCREMENTAL deliberately NOT disabled here: local gates rely on
# incremental builds for speed. CI sets CARGO_INCREMENTAL=0 itself.
# Keep heavy Rust artifacts outside each jj workspace. Cargo fingerprints and
# its target-directory lock select the right artifact for every revision; this
# lets isolated workspaces reuse already-built dependencies without duplicating
# a complete build tree per checkout.
CARGO_TARGET_DIR = "{{xdg_cache_home}}/lake/target"
CARGO_TERM_COLOR = "always"
CARGO_NET_RETRY = "10"
RUST_BACKTRACE = "1"
RUSTUP_MAX_RETRIES = "10"

# ========================================================================================
# Lifecycle
# ========================================================================================

[tasks.doctor]
description = "session-start health check: tools, nightly rustfmt, cargo check, jj, gh"
run = "bun scripts/doctor.ts"

[tasks.agenda]
description = "list open agent:claude issues from GitHub"
run = "gh issue list --label agent:claude --state open --limit 30"

[tasks.codegraph]
description = "(re)build the code knowledge graph used by the code-review-graph MCP"
run = "uvx code-review-graph build"

[tasks.codegraph-update]
description = "incremental codegraph update (only changed files)"
run = "uvx code-review-graph update"

# ========================================================================================
# Code Quality
# ========================================================================================

[tasks.fmt]
description = "format Rust code (nightly rustfmt)"
run = "cargo +nightly fmt --all"

[tasks.fmt-check]
description = "check formatting without writing"
run = "cargo +nightly fmt --all -- --check"

[tasks.clippy]
description = "cargo clippy with -D warnings"
run = "cargo clippy --workspace --all-targets --all-features --no-deps -- -D warnings"

[tasks.dependency-deny]
description = "enforce Cargo advisory, ban, license, and source policy"
run = "cargo deny check"

[tasks.dependency-shear]
description = "reject unused dependencies declared in Cargo.toml files"
run = "cargo shear"

[tasks.hooks]
description = "run all pre-commit hooks against all files"
run = "prek run --all-files"

# ========================================================================================
# Build & Test
# ========================================================================================

[tasks.test]
description = "run workspace tests"
run = "cargo test --workspace --all-targets"

[tasks.adbc-install]
description = "install the frozen upstream ADBC interoperability environment"
run = "uv sync --project interop/adbc --frozen"

[tasks.test-adbc]
description = "run pinned upstream ADBC Flight SQL interoperability checks"
depends = ["adbc-install"]
run = "cargo test -p lake-query --test adbc_interop -- --ignored --test-threads=1"

[tasks.e2e]
description = "end-to-end self-check: create -> ingest -> SQL query"
run = "cargo run -p lake-cli -- selftest"

[tasks.site-install]
description = "install frozen dependencies for the Astro GitHub Pages site"
run = "bun install --cwd site --frozen-lockfile"

[tasks.site-check]
description = "typecheck, lint, build, index, and smoke-test the GitHub Pages site and docs"
depends = ["site-install"]
run = "bun run --cwd site check"

[tasks.test-env-up]
description = "start portless local integration deps: checkout-scoped localstack (Docker)"
run = "bun scripts/test-env.ts up"

[tasks.test-env-down]
description = "tear down this checkout's localstack container"
run = "bun scripts/test-env.ts down"

[tasks.test-integration]
description = "run the LocalStack integration tests (up -> ignored tests -> down)"
run = "bun scripts/test-integration.ts"

[tasks.test-integration-external]
description = "run ignored integration tests against an externally managed LocalStack"
run = "bun scripts/test-integration.ts --external"

[tasks.test-iceberg-integration]
description = "run Apache Iceberg REST + MinIO interoperability coverage (Docker)"
run = "bun scripts/test-iceberg-integration.ts"

[tasks.test-iceberg-integration-external]
description = "run Iceberg interoperability coverage against an externally managed fixture"
run = "bun scripts/test-iceberg-integration.ts --external"

[tasks.k8s-validate]
description = "strictly validate the checked-in Kubernetes reference against Kubernetes 1.32"
run = "kubeconform -strict -summary -kubernetes-version 1.32.0 deploy/kubernetes/lake.yaml"

# ponytail: gate = the FAST local loop (hooks, cargo test, e2e, Astro site).
# Dependency policy plus slow passes (cargo doc warnings, spec-selftest tooling
# lock) run in the comprehensive local gate via `mise run ci`.
[tasks.gate]
description = "fast local quality gate: hooks + Rust tests + e2e + Astro site and docs"
depends = ["hooks", "test", "test-adbc", "e2e", "site-check"]

[tasks.doc]
description = "cargo doc with -D warnings (slow; CI and on demand)"
run = 'env RUSTDOCFLAGS="-D warnings" cargo +nightly doc --workspace --no-deps --document-private-items'

# The comprehensive LOCAL gate — deliberately broader than GitHub CI: it also
# runs the LocalStack integration suite (needs Docker), which CI can only do in
# a constrained ephemeral runner. Local-first: this is the real gate; CI is a
# post-merge backstop on `main`. Ship via `mise run ship`.
[tasks.ci]
description = "comprehensive local gate: gate + dependency policy + doc + spec-selftest + Docker integration"
depends = ["gate", "dependency-deny", "dependency-shear", "doc", "spec-selftest", "test-integration", "test-iceberg-integration"]

# One command to ship: full local gate + Conventional Commit check, then push
# through the jj-pre-push gate. Local-first replacement for CI-catches-problems.
[tasks.ship]
description = "full local gate + conventional-commit check, then push"
run = '''
mise run ci
parent=$(jj log -r @- --no-graph -T 'commit_id')
mise run check-commits "origin/main..$parent"
jj git push
'''

# Continuous local feedback: bacon re-runs clippy on save.
[tasks.watch]
description = "bacon watch loop (clippy on save)"
run = "bacon clippy"

[tasks.check-commits]
description = "validate Conventional Commit subjects in a git revision range"
usage = '''
arg "<range>" help="git revision range, e.g. origin/main..HEAD"
'''
run = 'bun scripts/check-conventional-commit.ts --range "${usage_range?}"'

# ========================================================================================
# Spec / agent-spec (Task Contracts) — see specs/README.md
# ========================================================================================

[tasks.spec-init]
description = "scaffold a new lane-1 task spec: mise run spec-init <slug>"
usage = '''
arg "<slug>" help="short spec slug"
'''
run = 'agent-spec init --level task --lang en --name "${usage_slug?}"'

[tasks.spec-lint]
description = "lint a task spec (min-score 0.7): mise run spec-lint specs/issue-N-<slug>.spec.md"
usage = '''
arg "<spec>" help="path to specs/issue-N-<slug>.spec.md"
'''
run = 'agent-spec lint "${usage_spec?}" --min-score 0.7'

[tasks.spec-lifecycle]
description = "verify a task spec against this workspace (zero-match guarded)"
usage = '''
arg "<spec>" help="path to specs/issue-N-<slug>.spec.md"
'''
run = 'bun scripts/spec-lifecycle-guard.ts "${usage_spec?}"'

[tasks.spec-selftest]
description = "assert the lifecycle gate rejects the zero-match fixture"
run = "bun scripts/spec-selftest.ts"
