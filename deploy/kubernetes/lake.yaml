apiVersion: v1
kind: Namespace
metadata:
  name: lake-system
  labels:
    pod-security.kubernetes.io/enforce: restricted
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lake-query
  namespace: lake-system
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lake-metasrv
  namespace: lake-system
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lake-runtime
  namespace: lake-system
data:
  AWS_REGION: us-east-1
  LAKE_S3_BUCKET: replace-me
  LAKE_TABLE_PREFIX: tables
  LAKE_MANAGED_OBJECT_PREFIX: managed-objects
  LAKE_DYNAMODB_TABLE: lake-registry
  # Lake derives the prefix-query companion as lake-registry_prefix_v2.
  LAKE_ASYNC_QUERIES: "true"
  LAKE_ASYNC_DYNAMODB_TABLE: lake-async-queries
  LAKE_ASYNC_RESULT_PREFIX: async-query-results
  # Async state uses lake-async-queries_prefix_v2, never the catalog tables.
---
apiVersion: v1
kind: Service
metadata:
  name: lake-query
  namespace: lake-system
spec:
  selector:
    app.kubernetes.io/name: lake-query
  ports:
    - name: flight
      port: 50051
      targetPort: flight
---
apiVersion: v1
kind: Service
metadata:
  name: lake-metasrv
  namespace: lake-system
spec:
  selector:
    app.kubernetes.io/name: lake-metasrv
  ports:
    - name: flight
      port: 50052
      targetPort: flight
---
apiVersion: v1
kind: Service
metadata:
  name: lake-metasrv-headless
  namespace: lake-system
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: lake-metasrv
  ports:
    - name: flight
      port: 50052
      targetPort: flight
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: lake-query
  namespace: lake-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lake-query
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: lake-metasrv
  namespace: lake-system
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: lake-metasrv
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lake-query
  namespace: lake-system
spec:
  replicas: 3
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lake-query
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lake-query
        app.kubernetes.io/part-of: lake
      annotations:
        prometheus.io/scrape: "false"
    spec:
      serviceAccountName: lake-query
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: lake-query
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: lake-query
      initContainers:
        - name: prepare-secrets
          image: ghcr.io/rararulab/lake:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - >-
              cp /raw/* /prepared/;
              chmod 0600 /prepared/*
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: raw-secrets
              mountPath: /raw
              readOnly: true
            - name: runtime-secrets
              mountPath: /prepared
      containers:
        - name: lake
          image: ghcr.io/rararulab/lake:0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - --data-dir
            - /tmp/lake
            - query
            - --addr
            - 0.0.0.0:50051
            - --metadata-addr
            - https://lake-metasrv.lake-system.svc.cluster.local:50052
          ports:
            - name: flight
              containerPort: 50051
              protocol: TCP
          envFrom:
            - configMapRef:
                name: lake-runtime
          env:
            - name: LAKE_LOG_FORMAT
              value: json
            - name: OTEL_SERVICE_NAME
              value: lake-query
            - name: LAKE_OTLP_SHUTDOWN_TIMEOUT_MS
              value: "5000"
            - name: LAKE_METRICS_ADDR
              value: 127.0.0.1:9090
            - name: LAKE_SHUTDOWN_GRACE_MS
              value: "30000"
            - name: LAKE_QUERY_MAX_CONCURRENT
              value: "64"
            - name: LAKE_QUERY_TICKET_KEYS_FILE
              value: /var/run/lake-secrets/ticket-keys.json
            - name: LAKE_QUERY_TICKET_TTL_SECS
              value: "300"
            - name: LAKE_QUERY_MEMORY_BYTES
              value: "6442450944"
            - name: LAKE_QUERY_SPILL_BYTES
              value: "12884901888"
            - name: LAKE_QUERY_SPILL_DIR
              value: /tmp/lake-spill
            - name: LAKE_AUTH_PRINCIPALS_FILE
              value: /var/run/lake-secrets/principals.json
            - name: LAKE_TLS_CERT_FILE
              value: /var/run/lake-secrets/tls.crt
            - name: LAKE_TLS_KEY_FILE
              value: /var/run/lake-secrets/tls.key
            - name: LAKE_METADATA_AUTH_TOKEN_FILE
              value: /var/run/lake-secrets/metadata-token
            - name: LAKE_METADATA_CA_FILE
              value: /var/run/lake-secrets/ca.crt
            - name: LAKE_METADATA_SERVER_NAME
              value: lake-metasrv.lake-system.svc.cluster.local
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - >-
                  token="$(cat /var/run/lake-secrets/health-token)";
                  exec grpc_health_probe -addr=127.0.0.1:50051 -tls
                  -tls-ca-cert=/var/run/lake-secrets/ca.crt
                  -tls-server-name=lake-query.lake-system.svc.cluster.local
                  -rpc-header="authorization: Bearer ${token}" -service=''
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - >-
                  token="$(cat /var/run/lake-secrets/health-token)";
                  exec grpc_health_probe -addr=127.0.0.1:50051 -tls
                  -tls-ca-cert=/var/run/lake-secrets/ca.crt
                  -tls-server-name=lake-query.lake-system.svc.cluster.local
                  -rpc-header="authorization: Bearer ${token}" -service=''
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - >-
                  token="$(cat /var/run/lake-secrets/health-token)";
                  exec grpc_health_probe -addr=127.0.0.1:50051 -tls
                  -tls-ca-cert=/var/run/lake-secrets/ca.crt
                  -tls-server-name=lake-query.lake-system.svc.cluster.local
                  -rpc-header="authorization: Bearer ${token}"
                  -service=arrow.flight.protocol.FlightService
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
            limits:
              cpu: "8"
              memory: 8Gi
          volumeMounts:
            - name: runtime-secrets
              mountPath: /var/run/lake-secrets
              readOnly: true
            - name: spill
              mountPath: /tmp/lake-spill
      volumes:
        - name: raw-secrets
          secret:
            secretName: lake-query-runtime
            defaultMode: 0444
        - name: runtime-secrets
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        - name: spill
          emptyDir:
            sizeLimit: 16Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: lake-metasrv
  namespace: lake-system
spec:
  serviceName: lake-metasrv-headless
  replicas: 3
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: lake-metasrv
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lake-metasrv
        app.kubernetes.io/part-of: lake
      annotations:
        prometheus.io/scrape: "false"
    spec:
      serviceAccountName: lake-metasrv
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: lake-metasrv
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: lake-metasrv
      initContainers:
        - name: prepare-secrets
          image: ghcr.io/rararulab/lake:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - >-
              cp /raw/* /prepared/;
              chmod 0600 /prepared/*
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: raw-secrets
              mountPath: /raw
              readOnly: true
            - name: runtime-secrets
              mountPath: /prepared
      containers:
        - name: lake
          image: ghcr.io/rararulab/lake:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - >-
              exec /usr/local/bin/lake --data-dir /tmp/lake meta
              --addr "${POD_IP}:50052"
          ports:
            - name: flight
              containerPort: 50052
              protocol: TCP
          envFrom:
            - configMapRef:
                name: lake-runtime
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: LAKE_LOG_FORMAT
              value: json
            - name: OTEL_SERVICE_NAME
              value: lake-metasrv
            - name: LAKE_OTLP_SHUTDOWN_TIMEOUT_MS
              value: "5000"
            - name: LAKE_METRICS_ADDR
              value: 127.0.0.1:9090
            - name: LAKE_SHUTDOWN_GRACE_MS
              value: "30000"
            - name: LAKE_APPEND_MAX_CONCURRENT
              value: "8"
            - name: LAKE_APPEND_MAX_STREAM_BYTES
              value: "67108864"
            - name: LAKE_APPEND_MAX_BUFFERED_BYTES
              value: "268435456"
            - name: LAKE_AUTH_PRINCIPALS_FILE
              value: /var/run/lake-secrets/principals.json
            - name: LAKE_TLS_CERT_FILE
              value: /var/run/lake-secrets/tls.crt
            - name: LAKE_TLS_KEY_FILE
              value: /var/run/lake-secrets/tls.key
            - name: LAKE_PEER_AUTH_TOKEN_FILE
              value: /var/run/lake-secrets/peer-token
            - name: LAKE_PEER_CA_FILE
              value: /var/run/lake-secrets/ca.crt
            - name: LAKE_PEER_SERVER_NAME
              value: lake-metasrv.lake-system.svc.cluster.local
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - >-
                  token="$(cat /var/run/lake-secrets/health-token)";
                  exec grpc_health_probe -addr=${POD_IP}:50052 -tls
                  -tls-ca-cert=/var/run/lake-secrets/ca.crt
                  -tls-server-name=lake-metasrv.lake-system.svc.cluster.local
                  -rpc-header="authorization: Bearer ${token}" -service=''
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - >-
                  token="$(cat /var/run/lake-secrets/health-token)";
                  exec grpc_health_probe -addr=${POD_IP}:50052 -tls
                  -tls-ca-cert=/var/run/lake-secrets/ca.crt
                  -tls-server-name=lake-metasrv.lake-system.svc.cluster.local
                  -rpc-header="authorization: Bearer ${token}" -service=''
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - >-
                  token="$(cat /var/run/lake-secrets/health-token)";
                  exec grpc_health_probe -addr=${POD_IP}:50052 -tls
                  -tls-ca-cert=/var/run/lake-secrets/ca.crt
                  -tls-server-name=lake-metasrv.lake-system.svc.cluster.local
                  -rpc-header="authorization: Bearer ${token}"
                  -service=arrow.flight.protocol.FlightService
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: runtime-secrets
              mountPath: /var/run/lake-secrets
              readOnly: true
      volumes:
        - name: raw-secrets
          secret:
            secretName: lake-metasrv-runtime
            defaultMode: 0444
        - name: runtime-secrets
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
