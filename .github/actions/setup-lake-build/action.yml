name: Setup lake build environment
description: >-
  Rust toolchains (stable + nightly) and mise-managed tools for building the
  lake workspace on the self-hosted arc-runner-set. Kept as one composite
  action so the toolchain list cannot drift between the per-check CI jobs.

runs:
  using: composite
  steps:
    - name: Install Rust toolchains
      shell: bash
      run: |
        rustup toolchain install stable --component clippy
        rustup toolchain install nightly --component rustfmt

    - name: Set up mise toolchain
      uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
      with:
        github_token: ${{ github.token }}
        install: true
