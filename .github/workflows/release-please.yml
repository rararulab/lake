name: Release Please

on:
  push:
    branches: [main]
  # Reconciles a transient GitHub API/Actions failure through the same
  # idempotent release authority, without a second release writer.
  schedule:
    - cron: "17 * * * *"
  # Immediate operator recovery for a delayed or missed push event.
  workflow_dispatch:

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Maintain release
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Create or update release pull request
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Releases created by GITHUB_TOKEN do not emit another release workflow
      # event. workflow_dispatch is the deliberate exception, and the image
      # workflow re-validates this exact published tag before it can publish.
      - name: Dispatch release image publication
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/actions/workflows/release-image.yml/dispatches" \
            -f ref=main \
            -f "inputs[tag]=$RELEASE_TAG"
