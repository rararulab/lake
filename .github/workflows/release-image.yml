name: Publish release image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v1.0.0
        required: true
        type: string

concurrency:
  group: release-image-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish-image:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      IMAGE: ghcr.io/${{ github.repository }}
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out build recipe
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          path: build-recipe

      - name: Check out release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
          path: release-source
          fetch-depth: 0

      - name: Verify release source
        shell: bash
        working-directory: release-source
        run: |
          set -euo pipefail
          if ! printf '%s\n' "$RELEASE_TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "release tag must be vX.Y.Z: $RELEASE_TAG" >&2
            exit 1
          fi
          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            expected_revision="$GITHUB_SHA"
          else
            release="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG")"
            if [ "$(jq -r '.tag_name' <<<"$release")" != "$RELEASE_TAG" ] \
              || [ "$(jq -r '.draft' <<<"$release")" != "false" ] \
              || [ "$(jq -r '.published_at' <<<"$release")" = "null" ]; then
              echo "manual dispatch requires an already-published release for $RELEASE_TAG" >&2
              exit 1
            fi
            expected_revision="$(jq -r '.target_commitish' <<<"$release")"
          fi
          if ! [[ "$expected_revision" =~ ^[0-9a-f]{40}$ ]]; then
            echo "release must bind $RELEASE_TAG to an immutable commit SHA" >&2
            exit 1
          fi
          checked_out_revision="$(git rev-parse HEAD)"
          tag_revision="$(git rev-parse --verify "refs/tags/$RELEASE_TAG^{commit}")"
          if [ "$checked_out_revision" != "$tag_revision" ] \
            || [ "$checked_out_revision" != "$expected_revision" ]; then
            echo "checked-out tag does not match the trusted release revision" >&2
            exit 1
          fi
          version="$(tr -d '\r\n' < version.txt)"
          if [ "v$version" != "$RELEASE_TAG" ]; then
            echo "version.txt is $version, expected ${RELEASE_TAG#v}" >&2
            exit 1
          fi
          printf 'VERSION=%s\n' "$version" >> "$GITHUB_ENV"
          printf 'RELEASE_REVISION=%s\n' "$checked_out_revision" >> "$GITHUB_ENV"
          build_recipe_revision="$(git -C "$GITHUB_WORKSPACE/build-recipe" rev-parse HEAD)"
          if ! [[ "$build_recipe_revision" =~ ^[0-9a-f]{40}$ ]]; then
            echo "checked-out build recipe must bind an immutable commit SHA" >&2
            exit 1
          fi
          printf 'BUILD_RECIPE_REVISION=%s\n' "$build_recipe_revision" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-platform image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: release-source
          file: build-recipe/Dockerfile
          cache-from: type=gha,scope=lake-release-image
          cache-to: type=gha,scope=lake-release-image,mode=max
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.RELEASE_TAG }}
            ${{ env.IMAGE }}:${{ env.VERSION }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.RELEASE_REVISION }}
            org.opencontainers.image.version=${{ env.VERSION }}
            io.rararulab.lake.build-recipe.revision=${{ env.BUILD_RECIPE_REVISION }}

      - name: Publish image digest
        shell: bash
        run: |
          printf "## Published image\n\n\`%s@%s\`\n" \
            "$IMAGE" "${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
