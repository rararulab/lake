name: Publish release image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v1.0.0
        required: true
        type: string

concurrency:
  group: release-image-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish-image:
    runs-on: ubuntu-24.04
    env:
      IMAGE: ghcr.io/${{ github.repository }}
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Verify release source
        shell: bash
        run: |
          set -euo pipefail
          if ! printf '%s\n' "$RELEASE_TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "release tag must be vX.Y.Z: $RELEASE_TAG" >&2
            exit 1
          fi
          checked_out_tag="$(git describe --exact-match --tags HEAD 2>/dev/null || true)"
          if [ "$checked_out_tag" != "$RELEASE_TAG" ]; then
            echo "checked out commit is tagged $checked_out_tag, expected $RELEASE_TAG" >&2
            exit 1
          fi
          version="$(tr -d '\r\n' < version.txt)"
          if [ "v$version" != "$RELEASE_TAG" ]; then
            echo "version.txt is $version, expected ${RELEASE_TAG#v}" >&2
            exit 1
          fi
          printf 'VERSION=%s\n' "$version" >> "$GITHUB_ENV"
          printf 'RELEASE_REVISION=%s\n' "$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-platform image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.RELEASE_TAG }}
            ${{ env.IMAGE }}:${{ env.VERSION }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.RELEASE_REVISION }}
            org.opencontainers.image.version=${{ env.VERSION }}

      - name: Publish image digest
        shell: bash
        run: |
          printf "## Published image\n\n\`%s@%s\`\n" \
            "$IMAGE" "${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
