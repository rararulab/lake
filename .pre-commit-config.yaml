repos:
  - repo: local
    hooks:
      # ponytail: hooks are the FAST local gate — fmt + clippy only.
      # clippy subsumes cargo check; the slow passes (cargo doc warnings,
      # spec-selftest) run in CI via `mise run ci`.
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo +nightly fmt --all -- --check
        language: system
        pass_filenames: false
        types_or: [rust, toml]
        files: \.(rs|toml)$|Cargo\.lock$|rust-toolchain\.toml$

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets --all-features --no-deps -- -D warnings
        language: system
        pass_filenames: false
        types_or: [rust, toml]
        files: \.(rs|toml)$|Cargo\.lock$|rust-toolchain\.toml$

      - id: conventional-commit
        name: conventional commit message
        entry: bun scripts/check-conventional-commit.ts
        language: system
        stages: [commit-msg]
        always_run: true
